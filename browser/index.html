function setViewMode(mode) {
  viewMode = mode;
  localStorage.setItem('viewMode', mode);
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  document.getElementById('btn-timeline').classList.toggle('active', mode === 'timeline');
  applyFilters();
}
// ============================================================
// CARD SELECTION & RIGHT PANEL
// ============================================================
function selectCard(cardId) {
  const card = cardMap.get(cardId) || allCards.find(c => c.id === cardId);
  if (!card) return;

  const panel = document.getElementById('panel-right');
  // Cancel any in-progress close animation
  if (panel.classList.contains('closing')) {
    panel.classList.remove('closing');
  }

  selectedCardId = card.id;
  closeSidebar();
  savedScrollTop = document.getElementById('main-center').scrollTop;

  document.querySelectorAll('.card').forEach(el => el.classList.toggle('selected', el.dataset.id === card.id));

  // Open panel — transition:none in CSS prevents width flash from animation
  panel.classList.add('open', 'expanded');
  document.getElementById('panel-content').classList.add('open');
  document.getElementById('main-center').classList.add('narrow');
  document.getElementById('panel-resize-handle').classList.add('visible');

  openCardInPanelAsync(card);
  updatePillStyles();
}

async function openCardInPanelAsync(card) {
  // Render panel frame immediately (header, meta, nav) from metadata
  openCardInPanel(card, true);

  // If content already loaded, done
  if (card.markdown) return;
  if (contentCache.has(card.id)) {
    card.markdown = contentCache.get(card.id);
    card.body = card.markdown.replace(/^---\n[\s\S]*?\n---\n?/, '').trim();
    renderPanelBody(card);
    return;
  }

  // Loading skeleton that fills the content width to avoid narrow→wide flash
  document.getElementById('panel-markdown').innerHTML =
    '<div style="width:100%;color:var(--text-muted)">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;padding-top:4px">' +
        '<div class="spinner" style="margin:0"></div>' +
        '<span style="font-size:13px">加载中...</span>' +
      '</div>' +
      '<div class="skeleton-loading" style="height:22px;margin-bottom:18px;width:38%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:100%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:100%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:82%"></div>' +
      '<div style="height:28px"></div>' +
      '<div class="skeleton-loading" style="height:18px;margin-bottom:14px;width:32%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:100%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:94%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:68%"></div>' +
      '<div style="height:28px"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:100%"></div>' +
      '<div class="skeleton-loading" style="height:14px;margin-bottom:10px;width:76%"></div>' +
    '</div>';

  try {
    const slug = card.id.replace(/\//g, '-');
    const resp = await fetch('content/' + slug + '.json?v=' + (window.__BUILD_DATE__ || ''));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const shard = await resp.json();
    card.markdown = shard.markdown || '';
    card.body = card.markdown.replace(/^---\n[\s\S]*?\n---\n?/, '').trim();
    contentCache.set(card.id, card.markdown);
    renderPanelBody(card);
  } catch (e) {
    console.warn('Failed to load content for', card.id, ':', e.message);
    document.getElementById('panel-markdown').innerHTML =
      '<div style="padding:60px 0;text-align:center;color:var(--accent)"><span style="font-size:32px;display:block;margin-bottom:12px">⚠</span><span style="font-size:14px">内容加载失败</span><div style="font-size:12px;color:var(--text-muted);margin-top:8px">' + esc(e.message) + '</div></div>';
  }
}

function renderPanelBody(card) {
  const rawMarkdown = card.markdown || card.body || '';
  const { relatedLinks, cleanedMarkdown } = extractRelatedSection(rawMarkdown);
  const { sourceContributions, cleanedMarkdown: sectionStripped } = extractSourceContributions(cleanedMarkdown);
  const detailsMatch = sectionStripped.match(/<details>[\s\S]*?<\/details>/);
  let detailsHTML = '';
  let finalMarkdown = sectionStripped;
  if (detailsMatch) {
    detailsHTML = detailsMatch[0];
    finalMarkdown = sectionStripped.replace(detailsMatch[0], 'DETAILS_FOLD_PLACEHOLDER');
  }
  mermaidDiagrams = [];
  let panelHTML = renderMarkdownWithLinks(finalMarkdown);
  if (detailsHTML) {
    panelHTML = panelHTML.replace('DETAILS_FOLD_PLACEHOLDER', detailsHTML);
  }
  document.getElementById('panel-markdown').innerHTML = panelHTML;
  renderMermaidDiagrams(document.getElementById('panel-markdown'));

  // Source contributions
  const sourceContribEl = document.getElementById('panel-source-contrib');
  const sourceContribList = document.getElementById('panel-source-contrib-list');
  if (sourceContributions.length > 0) {
    sourceContribEl.style.display = 'block';
    sourceContribList.innerHTML = sourceContributions.map(sc => {
      const targetCard = findCardByWikilink(sc.target);
      const scIcon = (targetCard && CARD_META[targetCard.cardTypeKey]) ? CARD_META[targetCard.cardTypeKey].icon || '📄' : '📄';
      return `<div class="source-contrib-item" onclick="event.stopPropagation(); navigateWikilink('${esc(sc.target)}')" title="${esc(sc.target)}">
        <span class="sc-icon">${scIcon}</span>
        <span class="sc-body">
          <span class="sc-source">${esc(sc.display)}</span>
          ${sc.desc ? `<span class="sc-desc">${esc(sc.desc)}</span>` : ''}
        </span>
      </div>`;
    }).join('');
  } else {
    sourceContribEl.style.display = 'none';
  }

  // Archive footer
  const archiveFooter = document.getElementById('archive-footer');
  if (card.archives && card.archives.length) {
    archiveFooter.className = 'archive-footer has-archives';
    archiveFooter.innerHTML = `<span class="archive-footer-link" onclick="event.stopPropagation(); toggleArchiveList(event)">📜 历史版本 (${card.archives.length})</span>`;
  } else {
    archiveFooter.className = 'archive-footer';
    archiveFooter.innerHTML = '';
  }

  // Related cards
  let allRelated = [...relatedLinks];
  if (card.type === 'source' || card.type === 'raw_source' || card.id.startsWith('raw/') || card.id.startsWith('sources/')) {
    const refCards = findReferencingCards(card.id);
    for (const rc of refCards) {
      if (!allRelated.some(r => r.target === rc.id || r.target === rc.label)) {
        allRelated.push({ target: rc.id, display: rc.label, rel: null });
      }
    }
  }
  const relatedSection = document.getElementById('panel-related-section');
  const relatedChips = document.getElementById('panel-related-chips');
  if (allRelated.length > 0) {
    relatedSection.style.display = 'block';
    relatedChips.innerHTML = allRelated.map(link => {
      const targetCard = findCardByWikilink(link.target);
      const targetMeta = (targetCard && CARD_META[targetCard.cardTypeKey]) || {};
      const icon = targetMeta.icon || '📄';
      const relLabel = REL_TAG_LABELS[link.rel];
      const relTagHtml = relLabel ? `<span class="rel-tag" style="background:${getRelColor(link.rel)}18;color:${getRelColor(link.rel)}">${relLabel}</span>` : '';
      const chipWhy = link.why ? esc(link.why) : '';
      const chipColor = targetMeta.color || '#ccc';
      return `<span class="related-chip" style="--chip-accent:${chipColor}" onclick="event.stopPropagation(); navigateWikilink('${esc(link.target)}')" title="${esc(link.target)}">
        <span class="chip-icon">${icon}</span>
        <span class="chip-body">
          <span class="chip-title">${esc(link.display)}${relTagHtml}</span>
          ${chipWhy ? `<span class="chip-why">${chipWhy}</span>` : ''}
        </span>
      </span>`;
    }).join('');
  } else {
    relatedSection.style.display = 'none';
  }

  // Populate sidebar related chips
  const sidebarRelatedChips = document.getElementById('panel-sidebar-related-chips');
  if (allRelated.length > 0) {
    sidebarRelatedChips.innerHTML = allRelated.map(link => {
      const targetCard = findCardByWikilink(link.target);
      const targetMeta = (targetCard && CARD_META[targetCard.cardTypeKey]) || {};
      const icon = targetMeta.icon || '📄';
      const relLabel = REL_TAG_LABELS[link.rel];
      const relTagHtml = relLabel ? `<span class="rel-tag" style="background:${getRelColor(link.rel)}18;color:${getRelColor(link.rel)}">${relLabel}</span>` : '';
      const chipWhy = link.why ? esc(link.why) : '';
      const chipColor = targetMeta.color || '#ccc';
      return `<span class="related-chip" style="--chip-accent:${chipColor}" onclick="event.stopPropagation(); navigateWikilink('${esc(link.target)}')" title="${esc(link.target)}">
        <span class="chip-icon">${icon}</span>
        <span class="chip-body">
          <span class="chip-title">${esc(link.display)}${relTagHtml}</span>
          ${chipWhy ? `<span class="chip-why">${chipWhy}</span>` : ''}
        </span>
      </span>`;
    }).join('');
  } else {
    sidebarRelatedChips.innerHTML = '';
  }
}

function openCardInPanel(card, addToStack = true) {
  document.getElementById('panel-title').textContent = card.label || card.id;
  const meta = CARD_META[card.cardTypeKey] || {};
  const accentColor = meta.color || card.color || '#9e9e9e';
  document.getElementById('panel-header').style.setProperty('--panel-accent', accentColor);

  document.getElementById('panel-meta').innerHTML = `
    ${card.score ? `<span class="panel-score">★ ${card.score}/10</span>` : ''}
    <span>${meta.icon || ''} <span class="badge-lg" style="background:${accentColor}18;color:${accentColor}">${esc(meta.label || card.cardTypeLabel || card.cardTypeKey)}</span></span>
    ${card.updated ? `<span class="meta-chip">📅 ${card.updated}</span>` : ''}
    ${card.source_url ? `<a class="source-link" href="${esc(card.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="原文链接: ${esc(card.source_url)}">🔗 原文</a>` : ''}
    ${card.sources.length ? (card.markdown || '').includes('## 来源贡献')
      ? `<span class="source-link source-anchor" onclick="event.stopPropagation(); document.getElementById('panel-source-contrib').scrollIntoView({behavior: 'smooth', block: 'start'})" title="查看各来源的贡献说明">📚 ${card.sources.length} 来源 ↓</span>`
      : card.sources.slice(0, 3).map(s => `<span class="source-link" onclick="event.stopPropagation(); navigateWikilink('${esc(s)}')" title="打开原文: ${esc(s)}">📎 ${esc(s)}</span>`).join(' ') : ''}
  `;

  // Archive state — reset when opening a new card
  archiveState = null;
  document.getElementById('archive-banner').classList.remove('show');
  const oldDropdown = document.querySelector('.archive-version-list');
  if (oldDropdown) oldDropdown.remove();

  // Render body content
  renderPanelBody(card);

  // Navigation breadcrumb — only show back-to-previous when there's history
  if (addToStack !== false) navigationStack.push(card.id);
  const navEl = document.getElementById('panel-nav');
  if (navigationStack.length > 1) {
    const prevId = navigationStack[navigationStack.length - 2];
    const prevCard = allCards.find(x => x.id === prevId);
    navEl.className = 'show';
    navEl.innerHTML = `<span class="nav-arrow" onclick="navigateBackTo('${esc(prevId)}')">← ${esc(prevCard?.label || prevId)}</span>`;
  } else {
    navEl.className = '';
  }

  // Scroll panel body to top
  document.getElementById('panel-body').scrollTop = 0;

  // Update URL hash for sharing (no history entry)
  history.replaceState(null, '', '#' + card.id);
}

function closePanel() {
  const panel = document.getElementById('panel-right');
  if (!panel.classList.contains('open')) return;

  selectedCardId = null;
  updatePillStyles();
  document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));

  // Play close animation, then clean up layout
  panel.classList.add('closing');
  panel.addEventListener('animationend', function onCloseEnd() {
    panel.removeEventListener('animationend', onCloseEnd);
    panel.classList.remove('closing', 'open', 'expanded');
    document.getElementById('panel-content').classList.remove('open');
    document.getElementById('main-center').classList.remove('narrow');
    document.getElementById('panel-resize-handle').classList.remove('visible');
    document.getElementById('main-center').style.width = '';
    document.getElementById('main-center').style.flex = '';
    history.replaceState(null, '', window.location.pathname);
  }, { once: true });

  const restoreScroll = savedScrollTop;
  const center = document.getElementById('main-center');
  setTimeout(() => { center.scrollTop = restoreScroll; }, 50);
}
function navigateBackTo(cardId) {
  const idx = navigationStack.indexOf(cardId);
  if (idx >= 0) navigationStack = navigationStack.slice(0, idx);
  else navigationStack = [];
  const card = cardMap.get(cardId) || allCards.find(c => c.id === cardId);
  if (card) {
    selectedCardId = card.id;
    document.querySelectorAll('.card').forEach(el => el.classList.toggle('selected', el.dataset.id === card.id));
    openCardInPanel(card, false);
    // Scroll card into view
    const cardEl = document.querySelector(`.card[data-id="${esc(card.id)}"]`);
    if (cardEl) cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function resetPanel() {
  savedScrollTop = 0;
  closePanel();
  closeSidebar();
  clearAllFilters();
}

function findCardByWikilink(wikilink) {
  const parts = wikilink.split('|'); const targetName = parts[0].trim(); const lowerName = targetName.toLowerCase();
  if (cardMap.has(targetName)) return cardMap.get(targetName);
  if (cardMap.has(lowerName)) return cardMap.get(lowerName);
  const lastSeg = targetName.split('/').pop();
  if (lastSeg && cardMap.has(lastSeg.toLowerCase())) return cardMap.get(lastSeg.toLowerCase());
  for (const card of allCards) {
    if (card.id.toLowerCase().includes(lowerName)) return card;
    if ((card.label || '').toLowerCase().includes(lowerName)) return card;
  }
  return null;
}

function navigateWikilink(wikilink) {
  const card = findCardByWikilink(wikilink);
  if (card) { selectCard(card.id); document.getElementById('panel-body').scrollTop = 0; }
}

// ============================================================
// ARCHIVE VERSION VIEWING
// ============================================================
function toggleArchiveList(event) {
  const existing = document.querySelector('.archive-version-list');
  if (existing) { existing.remove(); return; }

  const card = cardMap.get(selectedCardId) || allCards.find(c => c.id === selectedCardId);
  if (!card || !card.archives) return;

  const list = document.createElement('div');
  list.className = 'archive-version-list show';
  list.innerHTML = card.archives.map(a =>
    `<div class="archive-version-item" onclick="event.stopPropagation(); viewArchiveVersion('${esc(card.id)}', ${a.version})">
      <span class="version-num">V${a.version}</span>
      <span style="color:var(--text-muted);margin-left:8px;font-size:11px">${a.updated ? esc(a.updated) : ''}</span>
      <span style="color:var(--text-muted);margin-left:8px;font-size:11px">${esc(a.filename)}</span>
    </div>`
  ).join('');
  list.onclick = (e) => e.stopPropagation();

  // Position dropdown above the archive footer
  const footer = document.getElementById('archive-footer');
  if (footer) {
    footer.style.position = 'relative';
    footer.appendChild(list);
  }
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function closeArchiveList() {
      document.removeEventListener('click', closeArchiveList);
      const el = document.querySelector('.archive-version-list');
      if (el) el.remove();
    }, { once: true });
  }, 0);
}

function viewArchiveVersion(cardId, version) {
  const card = cardMap.get(cardId) || allCards.find(c => c.id === cardId);
  if (!card || !card.archives) return;

  const archive = card.archives.find(a => a.version === version);
  if (!archive) return;

  // Save current state
  if (!archiveState) {
    archiveState = { cardId, currentMarkdown: card.markdown };
  }

  // Remove dropdown
  const dropdown = document.querySelector('.archive-version-list');
  if (dropdown) dropdown.remove();

  // Show archive banner
  document.getElementById('archive-version-label').textContent = `V${version}`;
  document.getElementById('archive-banner').classList.add('show');

  // Update footer to show we're viewing archive
  const footer = document.getElementById('archive-footer');
  if (footer) {
    footer.innerHTML = `<span style="color:var(--text-muted)">📜 正在查看 V${version}</span> · <span class="archive-footer-link" onclick="restoreCurrentVersion()">返回当前版本</span>`;
  }

  // Render archive markdown
  const { cleanedMarkdown } = extractRelatedSection(archive.markdown);
  mermaidDiagrams = [];
  document.getElementById('panel-markdown').innerHTML = renderMarkdownWithLinks(cleanedMarkdown);
  renderMermaidDiagrams(document.getElementById('panel-markdown'));
  document.getElementById('panel-body').scrollTop = 0;
}

function restoreCurrentVersion() {
  if (!archiveState) return;

  const card = cardMap.get(archiveState.cardId) || allCards.find(c => c.id === archiveState.cardId);
  if (!card) return;

  archiveState = null;
  document.getElementById('archive-banner').classList.remove('show');

  // Restore archive footer
  const footer = document.getElementById('archive-footer');
  if (footer && card.archives && card.archives.length) {
    footer.className = 'archive-footer has-archives';
    footer.innerHTML = `<span class="archive-footer-link" onclick="event.stopPropagation(); toggleArchiveList(event)">📜 历史版本 (${card.archives.length})</span>`;
  }

  const rawMarkdown = card.markdown || card.body || '';
  const { cleanedMarkdown } = extractRelatedSection(rawMarkdown);
  mermaidDiagrams = [];
  document.getElementById('panel-markdown').innerHTML = renderMarkdownWithLinks(cleanedMarkdown);
  renderMermaidDiagrams(document.getElementById('panel-markdown'));
  document.getElementById('panel-body').scrollTop = 0;
}

// ============================================================
// MARKDOWN RENDERING
// ============================================================
function renderMarkdownWithLinks(markdown) {
  if (!markdown) return '';
  const codeBlocks = [];
  let processed = markdown.replace(/```[\s\S]*?```/g, (match) => { codeBlocks.push(match); return `%%CODEBLOCK_${codeBlocks.length - 1}%%`; });
  const inlineCodes = [];
  processed = processed.replace(/`([^`]+)`/g, (match) => { inlineCodes.push(match); return `%%INLINECODE_${inlineCodes.length - 1}%%`; });
  const placeholders = [];
  processed = processed.replace(/\[\[([^\]]+)\]\]/g, (match, inner) => {
    const parts = inner.split('|'); const target = parts[0].trim(); const display = parts.length > 1 ? parts[1].trim() : target;
    const idx = placeholders.length; placeholders.push({ target, display }); return `\x00WL${idx}\x00`;
  });
  inlineCodes.forEach((code, i) => { processed = processed.replace(`%%INLINECODE_${i}%%`, code); });
  codeBlocks.forEach((block, i) => { processed = processed.replace(`%%CODEBLOCK_${i}%%`, block); });
  let html = renderMarkdown(processed);
  placeholders.forEach((ph, i) => {
    html = html.replace(`\x00WL${i}\x00`, `<span class="wikilink" onclick="event.stopPropagation(); navigateWikilink('${esc(ph.target)}')" title="打开: ${esc(ph.target)}">${esc(ph.display)}</span>`);
  });
  return html;
}

function extractSourceContributions(markdown) {
  if (!markdown) return { sourceContributions: [], cleanedMarkdown: '' };
  const lines = markdown.split('\n');
  let inSection = false;
  const cleaned = [], contribLines = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^##\s+来源贡献/.test(trimmed)) { inSection = true; continue; }
    if (inSection) {
      if (/^##?\s/.test(trimmed)) { inSection = false; cleaned.push(line); continue; }
      if (trimmed) contribLines.push(trimmed);
    } else { cleaned.push(line); }
  }
  const sourceContributions = [];
  for (const line of contribLines) {
    const wikilinkMatch = line.match(/\[\[([^\]]+)\]\]/);
    if (!wikilinkMatch) continue;
    const wlParts = wikilinkMatch[1].split('|');
    const target = wlParts[0].trim();
    const display = wlParts.length > 1 ? wlParts[1].trim() : target;
    const afterWl = line.slice(line.indexOf(wikilinkMatch[0]) + wikilinkMatch[0].length);
    const descMatch = afterWl.match(/[—–]\s*(.+)/);
    const desc = descMatch ? descMatch[1].trim() : '';
    sourceContributions.push({ target, display, desc });
  }
  return { sourceContributions, cleanedMarkdown: cleaned.join('\n') };
}

function extractRelatedSection(markdown) {
  if (!markdown) return { relatedLinks: [], cleanedMarkdown: '' };
  const lines = markdown.split('\n');
  let inRelated = false;
  const cleaned = [], relatedLines = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^##\s+关联/.test(trimmed)) { inRelated = true; continue; }
    if (inRelated) {
      if (/^##?\s/.test(trimmed)) { inRelated = false; cleaned.push(line); continue; }
      if (trimmed && /\[\[/.test(trimmed)) { relatedLines.push(trimmed); }
      else if (trimmed) { inRelated = false; cleaned.push(line); }
    } else { cleaned.push(line); }
  }
  const relatedLinks = [];
  for (const line of relatedLines) {
    const wikilinkMatch = line.match(/\[\[([^\]]+)\]\]/);
    if (!wikilinkMatch) continue;
    const wlParts = wikilinkMatch[1].split('|'); const target = wlParts[0].trim(); const display = wlParts.length > 1 ? wlParts[1].trim() : target;
    const dashMatch = line.match(/[—–-]\s*#(\w+)\s+(.+)/);
    const relMatch = dashMatch || line.match(/#(\w+)\b/);
    const rel = relMatch ? relMatch[1] : null;
    const why = dashMatch ? dashMatch[2].trim() : null;
    relatedLinks.push({ target, display, rel, why });
  }
  return { relatedLinks, cleanedMarkdown: cleaned.join('\n') };
}

function findReferencingCards(cardId) {
  let slug = cardId;
  if (slug.startsWith('raw_source/')) slug = slug.replace('raw_source/', '');
  if (slug.startsWith('raw/')) slug = slug.replace('raw/', '');
  if (slug.startsWith('sources/')) slug = slug.replace('sources/', '');
  return allCards.filter(card => {
    if (card.isTypePage || card.id === cardId) return false;
    return (card.sources || []).some(s => {
      const cleanS = s.replace(/^\[\[|\]\]$/g, '').split('|')[0].trim();
      return cleanS === slug || cleanS === cardId;
    });
  });
}

function renderMarkdown(markdown) {
  const stripped = markdown.replace(/^---\n[\s\S]*?\n---\n?/, '');
  const lines = stripped.split(/\r?\n/);
  const html = [];
  let paragraph = [];
  let firstH1Skipped = false;
  let listType = null, listItems = [];
  let quoteLines = [];
  let inCodeBlock = false, codeLines = [];
  let inMermaid = false, mermaidLines = [];
  let inTable = false, tableRows = [], tableAligns = [];
  let listStack = [];

  const renderListItem = (item) => {
    if (typeof item === 'string') return `<li>${inlineFormat(item)}</li>`;
    return `<li>${inlineFormat(item.text)}${item.nested || ''}</li>`;
  };
  const flushParagraph = () => { if (!paragraph.length) return; html.push(`<p>${inlineFormat(paragraph.join(' '))}</p>`); paragraph = []; };
  const flushList = () => {
    if (!listType || !listItems.length) return;
    html.push(`<${listType}>${listItems.map(renderListItem).join('')}</${listType}>`);
    listType = null; listItems = [];
  };
  const flushQuote = () => {
    if (!quoteLines.length) return;
    html.push(`<blockquote>${quoteLines.map(l => inlineFormat(l)).join('<br>')}</blockquote>`);
    quoteLines = [];
  };
  const flushCode = () => {
    if (!codeLines.length) { html.push('<pre><code></code></pre>'); return; }
    html.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`); codeLines = [];
  };
  const flushMermaidFn = () => {
    if (!mermaidLines.length) return;
    const code = mermaidLines.join('\n'); const idx = mermaidDiagrams.length; mermaidDiagrams.push(code);
    html.push(`<div class="mermaid-diagram" data-mermaid-idx="${idx}"></div>`); mermaidLines = [];
  };
  const flushTable = () => {
    if (!inTable || tableRows.length < 2) { inTable = false; tableRows = []; tableAligns = []; return; }
    const headerRow = tableRows[0]; const bodyRows = tableRows.slice(1);
    const aligns = tableAligns.length ? tableAligns : headerRow.map(() => 'left');
    const thead = `<thead><tr>${headerRow.map((cell, i) => `<th style="text-align:${aligns[i] || 'left'}">${inlineFormat(cell.trim())}</th>`).join('')}</tr></thead>`;
    const tbody = bodyRows.length ? `<tbody>${bodyRows.map(row => `<tr>${row.map((cell, i) => `<td style="text-align:${aligns[i] || 'left'}">${inlineFormat(cell.trim())}</td>`).join('')}</tr>`).join('')}</tbody>` : '';
    html.push(`<table>${thead}${tbody}</table>`); inTable = false; tableRows = []; tableAligns = [];
  };
  const flushNestedLists = () => {
    while (listStack.length > 0) {
      const entry = listStack.pop();
      const inner = `<${entry.type}>${entry.items.map(renderListItem).join('')}</${entry.type}>`;
      if (listStack.length > 0) {
        const parent = listStack[listStack.length - 1];
        const last = parent.items[parent.items.length - 1];
        if (typeof last === 'string') parent.items[parent.items.length - 1] = { text: last, nested: inner };
        else last.nested = (last.nested || '') + inner;
      } else if (listType) {
        const last = listItems[listItems.length - 1];
        if (typeof last === 'string') listItems[listItems.length - 1] = { text: last, nested: inner };
        else last.nested = (last.nested || '') + inner;
      } else { html.push(inner); }
    }
  };
  const closeNestedToLevel = (level) => {
    while (listStack.length > 0 && listStack[listStack.length - 1].indent >= level) {
      const entry = listStack.pop();
      const inner = `<${entry.type}>${entry.items.map(renderListItem).join('')}</${entry.type}>`;
      if (listStack.length > 0) {
        const parent = listStack[listStack.length - 1];
        const last = parent.items[parent.items.length - 1];
        if (typeof last === 'string') parent.items[parent.items.length - 1] = { text: last, nested: inner };
        else last.nested = (last.nested || '') + inner;
      } else if (listType) {
        const last = listItems[listItems.length - 1];
        if (typeof last === 'string') listItems[listItems.length - 1] = { text: last, nested: inner };
        else last.nested = (last.nested || '') + inner;
      } else { html.push(inner); }
    }
  };

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, '    ').trimEnd();
    const trimmed = line.trim();

    if (trimmed.startsWith('```')) {
      flushParagraph(); flushList(); flushQuote();
      if (inCodeBlock) { flushCode(); inCodeBlock = false; }
      else if (inMermaid) { flushMermaidFn(); inMermaid = false; }
      else if (/^```mermaid\b/.test(trimmed)) { inMermaid = true; }
      else { inCodeBlock = true; }
      continue;
    }
    if (inCodeBlock) { codeLines.push(rawLine); continue; }
    if (inMermaid) { mermaidLines.push(rawLine); continue; }
    if (!trimmed) { flushParagraph(); flushNestedLists(); flushList(); flushQuote(); flushTable(); continue; }

    const h = trimmed.match(/^(#{1,6})\s+(.+)$/);
    if (h) { flushParagraph(); flushNestedLists(); flushList(); flushQuote(); if (!firstH1Skipped && h[1].length === 1) { firstH1Skipped = true; continue; } html.push(`<h${h[1].length}>${inlineFormat(h[2])}</h${h[1].length}>`); continue; }
    if (/^(-{3,}|\*{3,})$/.test(trimmed)) { flushParagraph(); flushNestedLists(); flushList(); flushQuote(); html.push('<hr>'); continue; }
    const q = trimmed.match(/^>\s?(.*)$/);
    if (q) { flushParagraph(); flushNestedLists(); flushList(); quoteLines.push(q[1]); continue; }
    flushQuote();

    const listMatch = line.match(/^(\s*)([-*]|\d+\.)\s+(.+)$/);
    if (listMatch) {
      flushParagraph(); flushQuote();
      const indent = listMatch[1].length;
      const marker = listMatch[2]; const content = listMatch[3];
      const lType = /^\d+\.$/.test(marker) ? 'ol' : 'ul';
      if (!listType) { listType = lType; listItems.push(content); continue; }
      if (indent === 0) { if (listType !== lType) { flushNestedLists(); flushList(); listType = lType; } listItems.push(content); continue; }
      if (listStack.length === 0) { listStack.push({ indent, type: lType, items: [content] }); }
      else if (indent > listStack[listStack.length - 1].indent) { listStack.push({ indent, type: lType, items: [content] }); }
      else if (indent === listStack[listStack.length - 1].indent && listStack[listStack.length - 1].type === lType) { listStack[listStack.length - 1].items.push(content); }
      else { closeNestedToLevel(indent); listStack.push({ indent, type: lType, items: [content] }); }
      continue;
    }
    flushNestedLists(); flushList();

    const isTableRow = /^\|.+\|$/.test(trimmed);
    const isTableSep = /^\|([\s\-:]+\|)+$/.test(trimmed);
    if (isTableRow || isTableSep) {
      flushParagraph(); flushQuote();
      if (!inTable) inTable = true;
      if (isTableSep) {
        tableAligns = trimmed.split('|').slice(1, -1).map(s => { const t = s.trim(); if (t.startsWith(':') && t.endsWith(':')) return 'center'; if (t.endsWith(':')) return 'right'; return 'left'; });
      } else { tableRows.push(trimmed.split('|').slice(1, -1)); }
      continue;
    }
    flushTable();
    paragraph.push(trimmed);
  }

  if (inCodeBlock) flushCode();
  if (inMermaid) flushMermaidFn();
  flushNestedLists(); flushParagraph(); flushList(); flushQuote(); flushTable();
  return html.join('');
}

function inlineFormat(text) {
  let html = esc(text);
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" class="md-img" onclick="event.stopPropagation(); openLightbox(this.src)" loading="lazy">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" class="md-link">$1</a>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
  return html;
}

function esc(text) { if (!text) return ''; return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// Intercept clicks on .md-link elements (standard markdown links). If the link
// points to a local .md file, resolve it to a card and navigate in-app instead
// of triggering a file download.
function initMdLinkIntercept() {
  const panel = document.getElementById('panel-markdown');
  if (!panel) return;
  panel.addEventListener('click', function(e) {
    const link = e.target.closest('a.md-link');
    if (!link) return;
    const href = link.getAttribute('href');
    if (!href) return;
    // External URLs: let them open in new tab (target="_blank")
    if (/^https?:\/\//.test(href)) return;
    // Anchor links within the page
    if (href.startsWith('#')) return;

    e.preventDefault();
    e.stopPropagation();

    // Resolve relative paths and strip .md extension
    let slug = href.replace(/\.md(#.*)?$/, '$1').replace(/^\.\.\//g, '').replace(/^\//, '');

    // Try direct card lookup
    if (cardMap.has(slug)) { selectCard(slug); return; }

    // For raw/ paths, try matching raw_source card
    if (slug.startsWith('raw/')) {
      const rawSlug = slug.replace(/^raw\//, 'raw_source/');
      if (cardMap.has(rawSlug)) { selectCard(rawSlug); return; }
      // Also try by stem (strip bilingual/ prefix, -bilingual/-zh suffix)
      const cleaned = slug.replace('raw/bilingual/', 'raw/').replace(/-bilingual$/, '').replace(/-zh$/, '');
      const parts = cleaned.split('/');
      const basename = parts[parts.length - 1];
      const rawSourceId = 'raw_source/' + basename;
      if (cardMap.has(rawSourceId)) { selectCard(rawSourceId); return; }
      // Fuzzy search by id
      const found = allCards.find(c => c.id.endsWith('/' + basename));
      if (found) { selectCard(found.id); return; }
    }

    // For wiki/ paths
    if (slug.startsWith('wiki/')) {
      const wikiId = slug.replace(/^wiki\//, '');
      if (cardMap.has(wikiId)) { selectCard(wikiId); return; }
    }

    // Open raw file in browser (fallback)
    window.open(href, '_blank');
  });
}
function stripMarkdown(s) {
  if (!s) return '';
  return s
    .replace(/\[\[([^\]]+)\|([^\]]+)\]\]/g, '$2')
    .replace(/\[\[([^\]]+)\]\]/g, '$1')
    .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/`{3,}/g, '')
    .replace(/`{1,2}([^`]+)`{1,2}/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/#{1,6}\s*/g, '')
    .replace(/>\s*/g, '')
    .replace(/---+/g, '')
    .replace(/\[\[|\]\]/g, '')
    .replace(/\|/g, ' ')
    .replace(/\n{2,}/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// ============================================================
// MERMAID
// ============================================================
async function loadMermaid() {
  if (mermaidLoaded) return;
  if (window.mermaid) { mermaidLoaded = true; return; }
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
    script.onload = () => {
      mermaid.initialize({ startOnLoad: false, theme: getTheme() === 'dark' ? 'dark' : 'default', securityLevel: 'sandbox' });
      mermaidLoaded = true; resolve();
    };
    script.onerror = () => { console.warn('Mermaid CDN load failed'); resolve(); };
    document.head.appendChild(script);
  });
}

async function renderMermaidDiagrams(container) {
  const placeholders = container.querySelectorAll('.mermaid-diagram');
  if (!placeholders.length) return;
  try {
    await loadMermaid();
    for (const ph of placeholders) {
      const idx = parseInt(ph.dataset.mermaidIdx);
      try {
        const { svg } = await mermaid.render('mermaid-' + Math.random().toString(36).slice(2, 8), mermaidDiagrams[idx] || '');
        ph.innerHTML = svg; ph.classList.add('rendered');
      } catch (e) {
        ph.innerHTML = `<pre class="mermaid-error"><code>${esc(mermaidDiagrams[idx] || '')}</code></pre>`;
        ph.classList.add('error');
      }
    }
  } catch (e) {
    for (const ph of placeholders) {
      const idx = parseInt(ph.dataset.mermaidIdx);
      ph.innerHTML = `<pre><code>${esc(mermaidDiagrams[idx] || '')}</code></pre>`;
    }
  }
}

function toggleRelated() {
  document.getElementById('panel-related-section').classList.toggle('collapsed');
}

// ============================================================
// THEME
// ============================================================
function getTheme() {
  const stored = localStorage.getItem('theme');
  if (stored === 'dark' || stored === 'light') return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
}
function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next); applyTheme(next);
  if (typeof mermaid !== 'undefined') mermaid.run();
}
applyTheme(getTheme());
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (!localStorage.getItem('theme')) applyTheme(getTheme()); });

// ============================================================
// LIGHTBOX
// ============================================================
function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

  style.textContent = `[data-theme="dark"] #theme-toggle::after { content: '🌙'; } #theme-toggle::after { content: '☀️'; }`;
  document.head.appendChild(style);
})();

loadData();
